<!DOCTYPE html>
<html>
<head>
  <title>MEGA CHAOS BUTTONS</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: white;
      overflow: hidden;
      transition: 0.2s;
    }

    #panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    button {
      width: 220px;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .shake { animation: shake 0.1s infinite; }

    @keyframes shake {
      0% { transform: translate(2px,2px); }
      50% { transform: translate(-2px,-2px); }
      100% { transform: translate(2px,2px); }
    }

    .bounceTitle {
      position: relative;
    }
  </style>
</head>

<body>

<h1 id="title">⚡ MEGA CHAOS BUTTONS ⚡</h1>
<h3 id="score">Score: 0</h3>

<div id="panel">

  <button onclick="randomColor()">🎨 Random Color</button>
  <button onclick="flash()">⚡ Flash</button>
  <button onclick="grow()">📏 Grow</button>
  <button onclick="shrink()">📉 Shrink</button>
  <button onclick="rain()">🌧 Rain</button>
  <button onclick="earthquake()">🌍 Earthquake</button>
  <button onclick="night()">🌙 Night Mode</button>
  <button onclick="day()">☀️ Day Mode</button>
  <button onclick="bounce()">🏀 Bounce Title</button>
  <button onclick="spawn()">👾 Spawn Enemies</button>
  <button onclick="shake()">📳 Shake</button>
  <button onclick="reset()">🔄 Reset Everything</button>

</div>

<script>

let score = 0;

function add(n){
  score += n;
  document.getElementById("score").innerText = "Score: " + score;
}

function r(){
  return Math.floor(Math.random()*255);
}

/* 🎨 COLORS */
function randomColor(){
  document.body.style.background = `rgb(${r()},${r()},${r()})`;
  add(1);
}

/* ⚡ FLASH */
function flash(){
  document.body.style.background = "white";
  setTimeout(()=>{
    document.body.style.background = `rgb(${r()},${r()},${r()})`;
  },100);
  add(2);
}

/* 📏 GROW / SHRINK */
function grow(){
  document.body.style.transform = "scale(1.2)";
  add(2);
}

function shrink(){
  document.body.style.transform = "scale(0.8)";
  add(2);
}

/* 🌧 RAIN */
function rain(){
  for(let i=0;i<15;i++){
    let e = document.createElement("div");
    e.innerText = "🎉";
    e.style.position = "absolute";
    e.style.left = Math.random()*window.innerWidth + "px";
    e.style.top = "-20px";
    document.body.appendChild(e);

    let fall = setInterval(()=>{
      e.style.top = e.offsetTop + 5 + "px";
      if(e.offsetTop > window.innerHeight){
        e.remove();
        clearInterval(fall);
      }
    },20);
  }
  add(3);
}

/* 🌍 EARTHQUAKE */
function earthquake(){
  document.body.classList.toggle("shake");
  add(3);
}

/* 🌙 NIGHT / ☀️ DAY */
function night(){
  document.body.style.background = "#000";
  document.body.style.color = "#fff";
  add(2);
}

function day(){
  document.body.style.background = "#fff";
  document.body.style.color = "#000";
  add(2);
}

/* 🏀 BOUNCE TITLE */
function bounce(){
  let t = document.getElementById("title");
  let pos = 0;
  let dir = 2;

  let move = setInterval(()=>{
    pos += dir;
    t.style.position = "relative";
    t.style.top = pos + "px";

    if(pos > 30 || pos < 0) dir *= -1;
  },20);

  setTimeout(()=>clearInterval(move),2000);
  add(5);
}

/* 👾 SPAWN */
function spawn(){
  for(let i=0;i<10;i++){
    let e = document.createElement("div");
    e.innerText = "👾";
    e.style.position = "absolute";
    e.style.left = Math.random()*window.innerWidth + "px";
    e.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(e);

    setTimeout(()=>e.remove(),3000);
  }
  add(5);
}

/* 📳 SHAKE */
function shake(){
  document.body.classList.toggle("shake");
  add(2);
}

/* 🔄 RESET */
function reset(){
  document.body.style.background = "white";
  document.body.style.transform = "none";
  document.body.style.color = "black";
  document.body.classList.remove("shake");

  score = 0;
  document.getElementById("score").innerText = "Score: 0";
}

</script>

</body>
</html>
