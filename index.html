<!DOCTYPE html>
<html>
<head>
  <title>Final Chaos Buttons</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: white;
      transition: 0.2s;
      overflow: hidden;
    }

    button {
      font-size: 13px;
      margin: 4px;
      padding: 8px;
      cursor: pointer;
      position: relative;
    }

    .big { transform: scale(1.6); }

    .shake { animation: shake 0.12s infinite; }

    @keyframes shake {
      0% { transform: translate(2px,2px); }
      50% { transform: translate(-2px,-2px); }
      100% { transform: translate(2px,2px); }
    }

    .purple {
      background: #a855f7;
      color: white;
    }

    .flash {
      animation: flash 0.2s;
    }

    @keyframes flash {
      0% { background: white; }
      50% { background: yellow; }
      100% { background: white; }
    }
  </style>
</head>

<body>

<h1 id="title">⚡ FINAL CHAOS ⚡</h1>
<h3 id="score">CHAOS SCORE: 0</h3>

<!-- BUTTONS -->
<button onclick="color()">🎨 Color</button>
<button onclick="spin()">🌀 Spin</button>
<button onclick="big()">🔍 Big</button>
<button onclick="shake()">📳 Shake</button>
<button onclick="sound()">🔊 Sound</button>
<button onclick="explode()">💥 Explode</button>
<button onclick="purple()">🟣 Purple Mode</button>
<button onclick="randomAll()">🎲 RANDOM CHAOS</button>
<button onclick="reset()">🔄 Reset</button>

<script>

let score = 0;

function addScore(n) {
  score += n;
  document.getElementById("score").innerText = "CHAOS SCORE: " + score;
}

function color() {
  document.body.style.background =
    `rgb(${r()},${r()},${r()})`;
  addScore(1);
}

function spin() {
  document.body.style.transform =
    `rotate(${Math.random()*50 - 25}deg)`;
  addScore(2);
}

function big() {
  document.body.classList.toggle("big");
  addScore(3);
}

function shake() {
  document.body.classList.toggle("shake");
  addScore(2);
}

function sound() {
  let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
  audio.play();
  addScore(5);
}

function explode() {
  document.body.classList.add("flash");
  document.getElementById("title").innerText = "💥 BOOM 💥";

  setTimeout(() => {
    document.body.classList.remove("flash");
    document.getElementById("title").innerText = "⚡ FINAL CHAOS ⚡";
  }, 300);
  addScore(10);
}

function purple() {
  document.body.style.background = "#2a003f";
  document.body.style.color = "white";

  document.querySelectorAll("button").forEach(b => {
    b.classList.toggle("purple");
  });

  addScore(7);
}

function randomAll() {
  color();
  spin();
  big();
  shake();
  sound();
  explode();
  purple();
  addScore(20);
}

function reset() {
  document.body.style.background = "white";
  document.body.style.transform = "none";
  document.body.style.color = "black";
  document.body.classList.remove("big","shake");

  document.getElementById("title").innerText = "⚡ FINAL CHAOS ⚡";
  score = 0;
  document.getElementById("score").innerText = "CHAOS SCORE: 0";

  document.querySelectorAll("button").forEach(b => {
    b.classList.remove("purple");
  });
}

function r() {
  return Math.floor(Math.random() * 255);
}

</script>

</body>
</html>
