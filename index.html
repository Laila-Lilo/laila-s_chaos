<!DOCTYPE html>
<html>
<head>
  <title>MEGA CHAOS FIXED</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: white;
      overflow: hidden;
      transition: 0.2s;
    }

    #panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .shake { animation: shake 0.1s infinite; }

    @keyframes shake {
      0% { transform: translate(2px,2px); }
      50% { transform: translate(-2px,-2px); }
      100% { transform: translate(2px,2px); }
    }
  </style>
</head>

<body>

<h1>⚡ TRUE MEGA CHAOS ⚡</h1>
<h3 id="score">Score: 0</h3>

<div id="panel">

  <button onclick="colorBurst()">🎨 Color Burst</button>
  <button onclick="screenBlink()">⚡ Screen Blink</button>
  <button onclick="zoomIn()">🔍 Zoom In</button>
  <button onclick="zoomOut()">🔎 Zoom Out</button>
  <button onclick="textFlip()">🔄 Text Flip</button>
  <button onclick="gravityOn()">⬇️ Gravity ON</button>
  <button onclick="gravityOff()">⬆️ Gravity OFF</button>
  <button onclick="emojiStorm()">🌪 Emoji Storm</button>
  <button onclick="freeze()">🧊 Freeze Page</button>
  <button onclick="unfreeze()">🔥 Unfreeze</button>
  <button onclick="titleChaos()">🧠 Title Chaos</button>
  <button onclick="reset()">🔄 Reset</button>

</div>

<script>

let score = 0;
let gravityInterval;

function add(n){
  score += n;
  document.getElementById("score").innerText = "Score: " + score;
}

function r(){ return Math.floor(Math.random()*255); }

/* 🎨 COLOR BURST */
function colorBurst(){
  document.body.style.background = `rgb(${r()},${r()},${r()})`;
  add(1);
}

/* ⚡ BLINK */
function screenBlink(){
  document.body.style.background = "white";
  setTimeout(()=>{
    document.body.style.background = `rgb(${r()},${r()},${r()})`;
  },100);
  add(2);
}

/* 🔍 ZOOM */
function zoomIn(){
  document.body.style.transform = "scale(1.3)";
  add(2);
}

function zoomOut(){
  document.body.style.transform = "scale(0.7)";
  add(2);
}

/* 🔄 TEXT FLIP */
function textFlip(){
  document.body.style.transform = "rotateY(180deg)";
  add(3);
}

/* ⬇️ GRAVITY */
function gravityOn(){
  clearInterval(gravityInterval);

  document.querySelectorAll("button").forEach(btn=>{
    let t = 0;
    gravityInterval = setInterval(()=>{
      t += 5;
      btn.style.position = "relative";
      btn.style.top = t + "px";
    },30);
  });

  add(5);
}

function gravityOff(){
  clearInterval(gravityInterval);
  document.querySelectorAll("button").forEach(btn=>{
    btn.style.top = "0px";
  });
  add(2);
}

/* 🌪 EMOJI STORM */
function emojiStorm(){
  let emojis = ["🔥","💀","👾","💥","🎉"];

  for(let i=0;i<20;i++){
    let e = document.createElement("div");
    e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.position = "absolute";
    e.style.left = Math.random()*window.innerWidth + "px";
    e.style.top = "-20px";
    document.body.appendChild(e);

    let fall = setInterval(()=>{
      e.style.top = e.offsetTop + 6 + "px";
      if(e.offsetTop > window.innerHeight){
        e.remove();
        clearInterval(fall);
      }
    },20);
  }

  add(4);
}

/* 🧊 FREEZE */
function freeze(){
  document.body.style.pointerEvents = "none";
  add(3);
}

/* 🔥 UNFREEZE */
function unfreeze(){
  document.body.style.pointerEvents = "auto";
  add(2);
}

/* 🧠 TITLE CHAOS */
function titleChaos(){
  let t = document.querySelector("h1");
  let words = ["CHAOS","BROKEN","GLITCH","WOW","ERROR","FUN"];
  t.innerText = words[Math.floor(Math.random()*words.length)];
  add(3);
}

/* 🔄 RESET */
function reset(){
  document.body.style = "";
  document.body.classList.remove("shake");
  document.querySelectorAll("button").forEach(b=>{
    b.style.position = "";
    b.style.top = "";
  });

  document.querySelector("h1").innerText = "⚡ TRUE MEGA CHAOS ⚡";

  score = 0;
  document.getElementById("score").innerText = "Score: 0";
}

</script>

</body>
</html>
